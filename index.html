<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse and download free PDFs.">
  <title>Rey PDF Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; color: #1e293b; }
        h1, h2, .font-serif { font-family: 'Cinzel', serif; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://religionmediacentre.org.uk/wp-content/uploads/2018/04/james-coleman-QHRZv6PIW4s-unsplash-scaled-1-1024x683.jpg');
            background-size: cover; background-position: center;
        }
        /* Mobile menu toggle logic (no-JS fallback) */
        #menu-toggle:checked ~ #mobile-menu { display: block; }
    </style>
  <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased max-w-[100vw]">
    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 px-4 md:px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl md:text-2xl font-bold tracking-tighter">
                REY<span class="text-amber-700">PDF</span>
            </div>
        </div>
        <input type="checkbox" id="menu-toggle" class="hidden">
    </nav>
  <header class="hero-bg min-h-[50vh] flex flex-col items-center justify-center text-center text-white px-6 py-12">
      <h1 class="text-3xl md:text-5xl lg:text-6xl mb-4 leading-tight">Sacred Music Archive</h1>
      <p class="text-sm md:text-lg opacity-80 max-w-xl italic font-light">"Sing to the Lord a new song; sing to the Lord, all the earth."</p>
      
      <div class="mt-10 w-full max-w-lg">
        <div class="relative group">
          <input id="search" type="text" placeholder="Search by title..." 
                  class="w-full py-4 pl-6 pr-16 rounded-2xl text-slate-900 shadow-2xl focus:ring-2 focus:ring-amber-500 outline-none transition-all" autocomplete="off">
          <button class="absolute right-2 top-2 bg-amber-700 p-2 rounded-xl hover:scale-105 transition shadow-lg">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </button>
        </div>
      </div>
  </header>
  <main class="max-w-7xl mx-auto py-8 md:py-16 px-4 md:px-8 grid-cols-1">
    <div>
      <section>
        <div id="pdf-container" class="grid grid-cols-1 lg:grid-cols-4 gap-12"></div>
      </section>
    </div>
  </main>
  <main class="max-w-7xl mx-auto py-8 md:py-16 px-4 md:px-8">
    <div>
      <section>
        <div class="grid grid-cols-12 lg:grid-cols-12" id="pagination"></div>
      </section>
    </div>
  </main>
  

      <!-- Hidden SEO links -->
  <div id="all-links" style="display:none;"></div>
  <script src="script.js"></script>

    <footer class="bg-white border-t border-slate-100 py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-slate-400 text-sm">
            <p>&copy; 2026 REY PDF. All for the Glory of God.</p>
        </div>
    </footer>
</body>
</html>
