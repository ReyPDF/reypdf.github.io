<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rey PDF Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="description" content="Browse and download free PDFs.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
      body { font-family: 'Inter', sans-serif; background-color: #fdfcfb; }
      h1, h2, .hymn-title { font-family: 'Cinzel', serif; }
      .hero-gradient {
          background: linear-gradient(rgba(20, 30, 48, 0.8), rgba(20, 30, 48, 0.8)), 
                      url('https://images.unsplash.com/photo-1515524738708-327f6b0037a7?auto=format&fit=crop&q=80&w=1500');
          background-size: cover;
          background-position: center;
      }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero-gradient h-80 flex flex-col items-center justify-center text-center text-white px-4">
    <h1 class="text-4xl md:text-5xl mb-4">Liturgical Music Library</h1>
    <p class="text-lg opacity-90 max-w-2xl italic">"He who sings, prays twice." — St. Augustine</p>
    
    <div class="mt-8 w-full max-w-xl relative">
        <input id="search" type="text" placeholder="Search by title, season, or composer..." 
                class="w-full py-4 px-6 rounded-full text-slate-800 focus:outline-none shadow-xl" autocomplete="off">
        <button class="absolute right-3 top-2 bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-full transition">
            Search
        </button>
    </div>
</header>
<main class="max-w-6xl mx-auto py-12 px-6">
<section class="w-full md:w-3/4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
  <div id="pdf-container"></div>
</section>

<div id="pagination"></div>

<!-- Hidden SEO links -->
<div id="all-links" style="display:none;"></div>

<script src="script.js"></script>

</main>

<footer class="bg-slate-900 text-slate-400 py-12 px-6 text-center text-sm">
    <p>&copy; 2024 Rey PDF Library. Ad maiorem Dei gloriam.</p>
</footer>
</body>
</html>
